<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calorie Counter</h1>
        
        <form id="calorie-form">
            <div class="form-group">
                <input type="text" id="item-name" placeholder="Food Item (e.g. Apple)" required>
            </div>
            <div class="form-group">
                <input type="number" id="item-calories" placeholder="Calories" required>
            </div>
            <button type="submit" class="btn btn-primary">Add Item</button>
        </form>

        <div class="stats-card">
            <span class="stats-label">Total Calories:</span>
            <span id="total-calories" class="stats-value">0</span>
        </div>

        <ul id="food-list">
            <!-- Items injected via JS -->
        </ul>

        <div class="actions">
            <button id="reset-btn" class="btn btn-danger">Reset Day</button>
            <button id="fetch-btn" class="btn btn-secondary">Load Defaults</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
