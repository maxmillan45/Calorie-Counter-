<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calorie counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calorie Counter</h1>

        <form id="calorie-form">
            <input type="text" id="food-name" placeholder="Enter food item" required>
            <input type="number" id="calories" placeholder="Enter calories" required>
            <button type="submit">Add</button>
        </form>
        <ul id="food-list"></ul>
        <div class="total">
            Total Calories: <span id="total-calories">0</span>
        </div>
    <button id="reset-btn" class="reset">Reset Day</button>
    </div>
    
    <script src="script.js"></script>
    
</body>
</html>
